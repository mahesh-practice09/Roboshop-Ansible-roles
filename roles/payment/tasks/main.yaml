- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: Install Python gcc python3-devel
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
  - python3
  - gcc
  - python3-devel
- name: Install required dependencies using requirements.txt
  ansible.builtin.pip:
    requirements: requirements.txt
    executable: pip3.9
    chdir: /app

- name: systemd setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-setup.yaml
